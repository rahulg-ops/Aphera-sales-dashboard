<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aphera Hospitality — Live Sales Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",Tahoma,sans-serif;background:#0f1923;min-height:100vh}
.top-header{background:linear-gradient(135deg,#1a2f5a 0%,#1e3a6e 100%);padding:22px 36px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #2e75b6;flex-wrap:wrap;gap:10px}
.top-header h1{color:#fff;font-size:22px;font-weight:700;letter-spacing:.5px}
.top-header .subtitle{color:#8eb4e3;font-size:12px;margin-top:3px}
.top-header .gen-time{color:#6a93c5;font-size:11px;text-align:right}
.loading-bar{background:#1a3060;color:#4db8ff;text-align:center;padding:8px;font-size:12px;letter-spacing:.5px;transition:all .3s}
.kpi-strip{display:flex;gap:14px;padding:18px 36px;background:#131f2e;flex-wrap:wrap}
.kpi{flex:1;min-width:170px;background:#1c2d44;border-radius:8px;padding:16px 18px;border-left:4px solid #2e75b6}
.kpi.green{border-left-color:#27ae60}.kpi.amber{border-left-color:#f39c12}.kpi.red{border-left-color:#e74c3c}
.kpi-label{font-size:10px;color:#6e91b4;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.kpi-value{font-size:24px;font-weight:700;color:#e8f0fe}
.kpi-sub{font-size:10px;color:#4e7aab;margin-top:4px}
.tab-bar{display:flex;background:#101925;padding:0 36px;border-bottom:2px solid #1c3054;overflow-x:auto}
.tab-btn{padding:13px 22px;color:#5a80a8;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn:hover{color:#8eb4e3}.tab-btn.active{color:#4db8ff;border-bottom-color:#4db8ff}
.tab-panel{display:none;padding:24px 36px}.tab-panel.active{display:block}
.sec-head{font-size:14px;font-weight:700;color:#8eb4e3;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #1e3558}
.row-flex{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:24px}
.chart-card{background:#1c2d44;border-radius:8px;padding:20px;flex:1;min-width:280px}
.chart-card h3{font-size:12px;color:#6e91b4;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.chart-wrap{position:relative;height:260px}
.tbl-wrap{overflow-x:auto;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#1a3060}
th{padding:10px 14px;color:#8eb4e3;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;text-align:left;white-space:nowrap}
th.num,td.num{text-align:right}
tbody tr{border-bottom:1px solid #17263a}
tbody tr:hover{background:#1e3350}
td{padding:9px 14px;color:#c8d8f0;vertical-align:middle}
td.good{color:#27ae60;font-weight:600}td.warn{color:#f39c12;font-weight:600}td.bad{color:#e74c3c;font-weight:600}
tr.total-row td{background:#0d1e35;color:#e8f0fe;font-weight:700;border-top:2px solid #2e75b6}
.flow-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:20px}
.flow-table td{padding:10px 14px;border-bottom:1px solid #17263a;color:#c8d8f0}
.flow-table tr:hover td{background:#1e3350}
.flow-table .fl{font-weight:600;color:#8eb4e3}.flow-table .fa{text-align:right;font-family:monospace;font-weight:700}
.flow-table .fn{color:#e74c3c}.flow-table .fp{color:#27ae60}.flow-table .fnote{font-size:11px;color:#4e7aab;font-style:italic}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.badge.matched{background:#1a4a2a;color:#2ecc71}.badge.pending{background:#3a3000;color:#f39c12}
.badge.mismatch{background:#4a0000;color:#e74c3c}.badge.partial{background:#1a2a4a;color:#4db8ff}
.spinner{text-align:center;padding:60px;color:#4e7aab;font-size:14px}
@media(max-width:768px){.kpi-strip,.tab-panel{padding:12px}.top-header{padding:14px}}
</style>
</head>
<body>
<div class="top-header">
  <div>
    <h1>&#127771; APHERA HOSPITALITY</h1>
    <div class="subtitle">Live Sales Reconciliation Dashboard &mdash; Data from Google Sheets</div>
  </div>
  <div class="gen-time" id="lastUpdated">Loading&hellip;</div>
</div>
<div class="loading-bar" id="loadBar">&#9203; Fetching live data from Google Sheets&hellip;</div>
<div class="kpi-strip" id="kpiStrip"><div class="spinner">Loading KPIs&hellip;</div></div>
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('overview',this)">&#128200; Overview</button>
  <button class="tab-btn" onclick="switchTab('reco',this)">&#128203; Sales vs Receipt</button>
  <button class="tab-btn" onclick="switchTab('channel',this)">&#128381; Channel Reco</button>
  <button class="tab-btn" onclick="switchTab('swiggy',this)">&#127860; Swiggy / Dineout</button>
</div>
<div id="tab-overview" class="tab-panel active"><div class="spinner">Loading&hellip;</div></div>
<div id="tab-reco" class="tab-panel"><div class="spinner">Loading&hellip;</div></div>
<div id="tab-channel" class="tab-panel"><div class="spinner">Loading&hellip;</div></div>
<div id="tab-swiggy" class="tab-panel"><div class="spinner">Loading&hellip;</div></div>
<script>
const SID='1HiykvqlUSnzBFhWeGds68ciU0sNUSyQa1r0YZw6BQKc';
const GVZ=s=>`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(s)}`;
const INR=v=>'\u20b9\u202f'+Number(v).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0});
const INR2=v=>'\u20b9\u202f'+Number(v).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const PCT=v=>Number(v).toFixed(1)+'%';
const rcCls=r=>r>=90?'good':r>=70?'warn':'bad';
const PAL=['#2e75b6','#27ae60','#f39c12','#e74c3c','#9b59b6','#1abc9c','#e67e22','#3498db','#2ecc71'];
const inited={};
let D={};

async function gvizFetch(sheet){
  const r=await fetch(GVZ(sheet));
  const txt=await r.text();
  const j=JSON.parse(txt.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
  const cols=j.table.cols.map(c=>c.label);
  return j.table.rows.map(row=>{const o={};row.c.forEach((c,i)=>{o[cols[i]]=c?c.v:null;});return o;});
}

async function loadAll(){
  const lb=document.getElementById('loadBar');
  try{
    const [monthly,channels,utr,meta]=await Promise.all([
      gvizFetch('Monthly'),gvizFetch('Channels'),gvizFetch('Swiggy_UTR'),gvizFetch('Meta')
    ]);
    D.monthly=monthly; D.channels=channels; D.utr=utr;
    D.meta={}; meta.forEach(r=>{D.meta[r.Key]=r.Value;});
    lb.style.display='none';
    document.getElementById('lastUpdated').textContent='Last updated: '+(D.meta.last_updated||'');
    buildKPI(); initTab('overview'); inited.overview=true;
  }catch(e){
    lb.innerHTML='&#10060; <b>Failed to load.</b> Make sure the Google Sheet is shared as <b>Anyone with the link &rarr; Viewer</b>.<br><small style="opacity:.7">'+e.message+'</small>';
    lb.style.color='#e74c3c'; lb.style.padding='18px 36px';
  }
}

function buildKPI(){
  const m=D.meta;
  const rp=parseFloat(m.recovery_pct||0), out=parseFloat(m.outstanding||0);
  const kpis=[
    {label:'Total Sales',val:INR(m.total_sales||0),sub:'Dec 2025 \u2013 Mar 2026',cls:''},
    {label:'Bank Receipts',val:INR(m.total_receipts||0),sub:PCT(rp)+' recovery',cls:rp>=85?'green':rp>=70?'amber':'red'},
    {label:'Outstanding',val:INR(Math.max(0,out)),sub:'Pending collection',cls:out>0?'amber':'green'},
    {label:'Net Dineout Payout',val:INR(m.net_payout||0),sub:'After Swiggy fees',cls:''},
    {label:'Merchant Adj (Ads)',val:INR2(Math.abs(m.merchant_adj||0)),sub:'Deducted by Swiggy',cls:'red'},
  ];
  const s=document.getElementById('kpiStrip'); s.innerHTML='';
  kpis.forEach(k=>{
    const d=document.createElement('div');
    d.className='kpi '+k.cls;
    d.innerHTML='<div class="kpi-label">'+k.label+'</div><div class="kpi-value">'+k.val+'</div><div class="kpi-sub">'+k.sub+'</div>';
    s.appendChild(d);
  });
}

function switchTab(id,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if(!inited[id]){inited[id]=true;initTab(id);}
}

function initTab(id){
  if(id==='overview')buildOverview();
  else if(id==='reco')buildReco();
  else if(id==='channel')buildChannel();
  else if(id==='swiggy')buildSwiggy();
}

function mkChart(id,cfg){
  const c=document.getElementById(id);
  if(!c)return;
  return new Chart(c.getContext('2d'),cfg);
}

const dSc={
  x:{ticks:{color:'#6e91b4'},grid:{color:'rgba(255,255,255,.07)'}},
  y:{ticks:{color:'#6e91b4',callback:v=>'\u20b9'+(v/100000).toFixed(1)+'L'},grid:{color:'rgba(255,255,255,.07)'}}
};
const lgOpts={legend:{labels:{color:'#8eb4e3',font:{size:11}}}};

function buildOverview(){
  const m=D.monthly, ch=D.channels;
  document.getElementById('tab-overview').innerHTML=
    '<div class="sec-head">Financial Overview</div>'+
    '<div class="row-flex">'+
      '<div class="chart-card" style="flex:2;min-width:380px"><h3>Monthly Sales vs Receipts</h3><div class="chart-wrap"><canvas id="c1"></canvas></div></div>'+
      '<div class="chart-card" style="flex:1;min-width:260px"><h3>Collection Status</h3><div class="chart-wrap"><canvas id="c2"></canvas></div></div>'+
    '</div>'+
    '<div class="row-flex">'+
      '<div class="chart-card" style="flex:1;min-width:260px"><h3>Channel Recovery %</h3><div class="chart-wrap"><canvas id="c3"></canvas></div></div>'+
      '<div class="chart-card" style="flex:2;min-width:380px"><h3>Sales by Channel</h3><div class="chart-wrap"><canvas id="c4"></canvas></div></div>'+
    '</div>';
  const mLab=m.map(r=>r.Month),mS=m.map(r=>r.Sales),mR=m.map(r=>r.Receipts),mO=m.map(r=>r.Outstanding);
  const cLab=ch.map(r=>r.Channel),cS=ch.map(r=>r.Sales),cR=ch.map(r=>r.Receipts),cRc=ch.map(r=>r.Recovery_Pct);
  const tR=parseFloat(D.meta.total_receipts||0), tO=Math.max(0,parseFloat(D.meta.outstanding||0));
  mkChart('c1',{type:'bar',data:{labels:mLab,datasets:[
    {label:'Sales',data:mS,backgroundColor:'rgba(46,117,182,.7)'},
    {label:'Receipts',data:mR,backgroundColor:'rgba(39,174,96,.7)'},
    {label:'Outstanding',data:mO,backgroundColor:'rgba(231,76,60,.5)'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:lgOpts,scales:dSc}});
  mkChart('c2',{type:'doughnut',data:{labels:['Received','Outstanding'],datasets:[{
    data:[tR,tO],backgroundColor:['#27ae60','#e74c3c'],borderColor:'#1c2d44',borderWidth:3
  }]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#8eb4e3'}},tooltip:{callbacks:{label:c=>c.label+': '+INR(c.parsed)}}}}});
  mkChart('c3',{type:'bar',data:{labels:cLab,datasets:[{label:'Recovery %',data:cRc,backgroundColor:cLab.map((_,i)=>PAL[i%PAL.length])}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6e91b4',callback:v=>v+'%'},grid:{color:'rgba(255,255,255,.07)'},max:110},y:{ticks:{color:'#6e91b4'},grid:{display:false}}}}});
  mkChart('c4',{type:'bar',data:{labels:cLab,datasets:[
    {label:'Sales',data:cS,backgroundColor:'rgba(46,117,182,.7)'},
    {label:'Receipts',data:cR,backgroundColor:'rgba(39,174,96,.7)'}
  ]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:lgOpts,scales:{x:{ticks:{color:'#6e91b4',callback:v=>'\u20b9'+(v/100000).toFixed(1)+'L'},grid:{color:'rgba(255,255,255,.07)'}},y:{ticks:{color:'#6e91b4'},grid:{display:false}}}}});
}

function buildReco(){
  const m=D.monthly;
  let rows='';
  m.forEach(r=>{
    const rc=rcCls(r.Recovery_Pct);
    rows+='<tr><td>'+r.Month+'</td><td class="num">'+INR(r.Sales)+'</td><td class="num">'+INR(r.Receipts)+'</td><td class="num">'+INR(r.Outstanding)+'</td><td class="num '+rc+'">'+PCT(r.Recovery_Pct)+'</td></tr>';
  });
  const tS=m.reduce((a,r)=>a+r.Sales,0), tR2=m.reduce((a,r)=>a+r.Receipts,0), tO=m.reduce((a,r)=>a+r.Outstanding,0), tRc=tS>0?tR2/tS*100:0;
  rows+='<tr class="total-row"><td>TOTAL</td><td class="num">'+INR(tS)+'</td><td class="num">'+INR(tR2)+'</td><td class="num">'+INR(tO)+'</td><td class="num '+rcCls(tRc)+'">'+PCT(tRc)+'</td></tr>';
  const mLab=m.map(r=>r.Month), mS=m.map(r=>r.Sales), mR=m.map(r=>r.Receipts), mO=m.map(r=>r.Outstanding), mRc=m.map(r=>r.Recovery_Pct);
  document.getElementById('tab-reco').innerHTML=
    '<div class="sec-head">Month-wise Sales vs Bank Receipt Reconciliation</div>'+
    '<div class="row-flex">'+
      '<div class="chart-card" style="flex:2;min-width:380px"><h3>Receipts vs Outstanding</h3><div class="chart-wrap"><canvas id="r1"></canvas></div></div>'+
      '<div class="chart-card" style="flex:1;min-width:260px"><h3>Recovery % Trend</h3><div class="chart-wrap"><canvas id="r2"></canvas></div></div>'+
    '</div>'+
    '<div class="sec-head">Monthly Detail</div>'+
    '<div class="tbl-wrap"><table><thead><tr><th>Month</th><th class="num">Sales</th><th class="num">Receipts</th><th class="num">Outstanding</th><th class="num">Recovery %</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  mkChart('r1',{type:'bar',data:{labels:mLab,datasets:[
    {label:'Receipts',data:mR,backgroundColor:'rgba(39,174,96,.75)'},
    {label:'Outstanding',data:mO,backgroundColor:'rgba(231,76,60,.6)'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:lgOpts,scales:{x:{stacked:true,ticks:{color:'#6e91b4'},grid:{color:'rgba(255,255,255,.07)'}},y:{stacked:true,ticks:{color:'#6e91b4',callback:v=>'\u20b9'+(v/100000).toFixed(1)+'L'},grid:{color:'rgba(255,255,255,.07)'}}}}});
  mkChart('r2',{type:'line',data:{labels:mLab,datasets:[{label:'Recovery %',data:mRc,borderColor:'#4db8ff',backgroundColor:'rgba(77,184,255,.15)',tension:.4,pointBackgroundColor:'#4db8ff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:lgOpts,scales:{x:{ticks:{color:'#6e91b4'},grid:{color:'rgba(255,255,255,.07)'}},y:{ticks:{color:'#6e91b4',callback:v=>v+'%'},grid:{color:'rgba(255,255,255,.07)'},min:0}}}});
}

function buildChannel(){
  const ch=D.channels;
  let rows=''; let tS=0,tR=0,tO=0;
  ch.forEach(r=>{
    tS+=r.Sales; tR+=r.Receipts; tO+=r.Outstanding;
    const rc=rcCls(r.Recovery_Pct);
    rows+='<tr><td>'+r.Channel+'</td><td class="num">'+INR(r.Sales)+'</td><td class="num">'+INR(r.Receipts)+'</td><td class="num">'+INR(r.Outstanding)+'</td><td class="num '+rc+'">'+PCT(r.Recovery_Pct)+'</td></tr>';
  });
  const totRc=tS>0?tR/tS*100:0;
  rows+='<tr class="total-row"><td>TOTAL</td><td class="num">'+INR(tS)+'</td><td class="num">'+INR(tR)+'</td><td class="num">'+INR(tO)+'</td><td class="num '+rcCls(totRc)+'">'+PCT(totRc)+'</td></tr>';
  const cLab=ch.map(r=>r.Channel), cS=ch.map(r=>r.Sales), cR=ch.map(r=>r.Receipts), cO=ch.map(r=>r.Outstanding), cRc=ch.map(r=>r.Recovery_Pct);
  document.getElementById('tab-channel').innerHTML=
    '<div class="sec-head">Channel-wise Reconciliation</div>'+
    '<div class="row-flex">'+
      '<div class="chart-card" style="flex:3;min-width:420px"><h3>Sales vs Receipts by Channel</h3><div class="chart-wrap" style="height:300px"><canvas id="ch1"></canvas></div></div>'+
      '<div class="chart-card" style="flex:1;min-width:240px"><h3>Channel Recovery %</h3><div class="chart-wrap"><canvas id="ch2"></canvas></div></div>'+
    '</div>'+
    '<div class="sec-head">Channel Detail</div>'+
    '<div class="tbl-wrap"><table><thead><tr><th>Channel</th><th class="num">Sales</th><th class="num">Receipts</th><th class="num">Outstanding</th><th class="num">Recovery %</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  mkChart('ch1',{type:'bar',data:{labels:cLab,datasets:[
    {label:'Sales',data:cS,backgroundColor:'rgba(46,117,182,.7)'},
    {label:'Receipts',data:cR,backgroundColor:'rgba(39,174,96,.7)'},
    {label:'Outstanding',data:cO,backgroundColor:'rgba(231,76,60,.5)'}
  ]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:lgOpts,scales:{x:{ticks:{color:'#6e91b4',callback:v=>'\u20b9'+(v/100000).toFixed(1)+'L'},grid:{color:'rgba(255,255,255,.07)'}},y:{ticks:{color:'#6e91b4'},grid:{display:false}}}}});
  mkChart('ch2',{type:'doughnut',data:{labels:cLab,datasets:[{data:cRc,backgroundColor:PAL,borderColor:'#1c2d44',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#8eb4e3',font:{size:10}}},tooltip:{callbacks:{label:c=>c.label+': '+c.parsed+'%'}}}}});
}

function buildSwiggy(){
  const m=D.meta, utr=D.utr;
  const flowData=[
    ['Total Dineout Sales',          +m.dineout_sales||0,              false,'Monthly Sales Reports (MesPOS)'],
    ['\u2212 Swiggy Commission + GST', +m.swiggy_fees||0,             true, 'Invoice Row B'],
    ['\u2212 Merchant Adj (Ads)',      Math.abs(+m.merchant_adj||0),  true, 'Invoice Row C \u2014 deducted before remittance'],
    ['= Net Payout (Invoice)',         +m.net_payout||0,               false,'Invoice Row G'],
    ['Amount Receivable (CSV)',        +m.csv_receivable||0,           false,'Per-transaction Payout CSV'],
    ['Bank Receipts Received',         +m.bank_receipts_swiggy||0,    false,'Bank Statement \u2014 UTR matched'],
    ['Outstanding Gap',Math.max(0,(+m.csv_receivable||0)-(+m.bank_receipts_swiggy||0)),false,'Explained by Merchant Adjustments'],
  ];
  let fHtml='<tr style="background:#1a3060"><td class="fl">METRIC</td><td class="fa">AMOUNT</td><td class="fnote">SOURCE</td></tr>';
  flowData.forEach(([lbl,amt,neg,src])=>{
    fHtml+='<tr><td class="fl">'+lbl+'</td><td class="fa '+(neg?'fn':'fp')+'">'+INR2(amt)+'</td><td class="fnote">'+src+'</td></tr>';
  });
  let uHtml='';
  utr.forEach(u=>{
    const badge='<span class="badge '+(u.Status||'pending').toLowerCase()+'">'+u.Status+'</span>';
    const vc=(+u.Variance||0)>5?'bad':(+u.Variance||0)<-5?'good':'';
    uHtml+='<tr><td style="font-size:11px">'+u.UTR_ID+'</td><td>'+u.Date+'</td><td class="num">'+u.Txns+'</td><td class="num">'+INR2(u.Receivable)+'</td><td class="num">'+INR2(u.Bank_Receipt)+'</td><td class="num '+vc+'">'+INR2(u.Variance)+'</td><td>'+badge+'</td></tr>';
  });
  const tRv=utr.reduce((a,r)=>a+(+r.Receivable||0),0), tBk=utr.reduce((a,r)=>a+(+r.Bank_Receipt||0),0);
  uHtml+='<tr class="total-row"><td colspan="3">TOTAL ('+utr.length+' UTRs)</td><td class="num">'+INR2(tRv)+'</td><td class="num">'+INR2(tBk)+'</td><td class="num">'+INR2(tRv-tBk)+'</td><td></td></tr>';
  document.getElementById('tab-swiggy').innerHTML=
    '<div class="sec-head">Dineout / Swiggy \u2014 Financial Flow</div>'+
    '<table class="flow-table">'+fHtml+'</table>'+
    '<div class="sec-head" style="margin-top:20px">UTR-wise Matching ('+utr.length+' UTRs \u2014 '+m.utr_matched+'/'+m.utr_total+' Matched)</div>'+
    '<div class="tbl-wrap"><table><thead><tr><th>UTR ID</th><th>Date</th><th class="num">Txns</th><th class="num">Receivable</th><th class="num">Bank Rcpt</th><th class="num">Variance</th><th>Status</th></tr></thead><tbody>'+uHtml+'</tbody></table></div>'+
    '<div class="row-flex" style="margin-top:24px">'+
      '<div class="chart-card" style="flex:1;min-width:260px"><h3>Swiggy Recovery</h3><div class="chart-wrap"><canvas id="sw1"></canvas></div></div>'+
      '<div class="chart-card" style="flex:2;min-width:380px"><h3>UTR Receivable vs Bank Receipt</h3><div class="chart-wrap"><canvas id="sw2"></canvas></div></div>'+
    '</div>';
  mkChart('sw1',{type:'doughnut',data:{labels:['Bank Received','Outstanding'],datasets:[{data:[tBk,Math.max(0,tRv-tBk)],backgroundColor:['#27ae60','#e74c3c'],borderColor:'#1c2d44',borderWidth:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#8eb4e3'}},tooltip:{callbacks:{label:c=>c.label+': '+INR(c.parsed)}}}}});
  mkChart('sw2',{type:'bar',data:{labels:utr.map(u=>String(u.UTR_ID).slice(-8)),datasets:[
    {label:'Receivable',data:utr.map(u=>+u.Receivable||0),backgroundColor:'rgba(46,117,182,.7)'},
    {label:'Bank Rcpt',data:utr.map(u=>+u.Bank_Receipt||0),backgroundColor:'rgba(39,174,96,.7)'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:lgOpts,scales:{x:{ticks:{color:'#6e91b4',font:{size:9}},grid:{color:'rgba(255,255,255,.07)'}},y:{ticks:{color:'#6e91b4',callback:v=>'\u20b9'+(v/1000).toFixed(0)+'K'},grid:{color:'rgba(255,255,255,.07)'}}}}});
}

loadAll();
</script>
</body>
